<script>
        // Data storage object
        let workoutData = {
            daily: {},
            weights: {},
            challengeStart: todayISO(),
            targetWeight: 135
        };

        const motivationalQuotes = [
            "Every rep brings you closer to your goal! 💪",
            "135lbs is not just a number, it's your victory waiting to happen! 🏆",
            "Your body can do it. It's your mind you have to convince! 🧠",
            "Success isn't given. It's earned in the gym! 🔥",
            "The pain you feel today will be the strength you feel tomorrow! ⚡"
        ];

        function pad2(n) { return n < 10 ? '0' + n : '' + n; }
        function toISODateLocal(d) {
            return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
        }
        function todayISO() { return toISODateLocal(new Date()); }

        function calculateDaysRemaining() {
            const startDate = new Date(workoutData.challengeStart);
            const targetDate = new Date(startDate.getTime() + (20 * 24 * 60 * 60 * 1000));
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return Math.max(0, diffDays);
        }

        function logWeight() {
            const weightInput = document.getElementById('weight-input');
            const weight = parseFloat(weightInput.value);
            if (!weight || weight <= 0) { alert('Please enter a valid weight!'); return; }
            workoutData.weights[todayISO()] = weight;
            weightInput.value = '';
            updateWeightDisplay();
            updateProgressBar();
            updateMotivation();
        }

        function updateWeightDisplay() {
            const currentWeightElement = document.getElementById('current-weight');
            const weight = workoutData.weights[todayISO()];
            currentWeightElement.textContent = weight ? `Today's Weight: ${weight} lbs` : 'No weight logged today';
        }

        function updateProgressBar() {
            const today = todayISO();
            const currentWeight = workoutData.weights[today];
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            
            if (currentWeight) {
                const sortedDates = Object.keys(workoutData.weights).sort();
                const startWeight = workoutData.weights[sortedDates[0]] || currentWeight;
                const totalToGoal = Math.abs(workoutData.targetWeight - startWeight);
                const progressSoFar = Math.abs(currentWeight - startWeight);
                const percent = totalToGoal > 0 ? Math.min(100, (progressSoFar / totalToGoal) * 100) : 100;
                
                progressFill.style.width = `${percent}%`;
                progressText.textContent = `${progressSoFar.toFixed(1)} lbs progress toward goal`;
            } else {
                progressFill.style.width = '0%';
                progressText.textContent = 'Log your weight to see progress!';
            }
        }

        function updateMotivation() {
            const daysLeft = calculateDaysRemaining();
            document.getElementById('countdown').textContent = daysLeft;
            document.getElementById('motivation-quote').textContent = motivationalQuotes[Math.floor(Math.random() * motivationalQuotes.length)];
        }

        function addTally(reps) {
            const today = todayISO();
            if (!workoutData.daily[today]) workoutData.daily[today] = { counts: {} };
            workoutData.daily[today].counts[reps] = (workoutData.daily[today].counts[reps] || 0) + 1;
            updateDisplay();
            updateHistory();
        }

        function addCustomTally() {
            const input = document.getElementById('custom-reps-input');
            const reps = parseInt(input.value, 10);
            if (reps > 0) addTally(reps);
        }

        function updateDisplay() {
            const today = todayISO();
            const counts = workoutData.daily[today]?.counts || {};
            [20, 30, 40, 50].forEach(r => document.getElementById(`count-${r}`).textContent = counts[r] || 0);
            let total = 0;
            Object.keys(counts).forEach(r => total += Number(r) * counts[r]);
            document.getElementById('total-reps').textContent = total;
        }

        function updateHistory() {
            const historyList = document.getElementById('history-list');
            const dates = Object.keys(workoutData.daily).sort().reverse();
            historyList.innerHTML = dates.length ? '' : '<div class="no-data">No data yet.</div>';
            dates.forEach(date => {
                const day = workoutData.daily[date].counts;
                historyList.innerHTML += `<div class="history-entry"><strong>${date}</strong>: ${JSON.stringify(day)}</div>`;
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(workoutData)], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'fitness-data.json';
            a.click();
        }

        function handleImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    workoutData = JSON.parse(e.target.result);
                    updateDisplay();
                    updateHistory();
                    updateWeightDisplay();
                    updateProgressBar();
                    updateMotivation();
                    alert('Import Successful!');
                } catch (err) {
                    alert('Error parsing file.');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        // Initialize
        updateMotivation();
    </script>
